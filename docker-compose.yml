

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pocketwallet
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: pocketwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  pgdata:
  ollama_models: